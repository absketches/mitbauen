name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Type check, tests & coverage
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # needed to post coverage comment on PRs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (app)
        run: npx tsc --noEmit

      - name: Type check (tests)
        run: npx tsc --noEmit --project tsconfig.test.json

      - name: Run tests with coverage
        run: npm run test:coverage -- --reporter=verbose

      - name: Post coverage summary to job
        run: |
          echo "## Coverage summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat coverage/coverage-summary.json \
            | node -e "
              const data = require('/dev/stdin');
              const t = data.total;
              const pct = k => t[k].pct.toFixed(1) + '%';
              console.log('Statements : ' + pct('statements'));
              console.log('Branches   : ' + pct('branches'));
              console.log('Functions  : ' + pct('functions'));
              console.log('Lines      : ' + pct('lines'));
            " \
          >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const t = summary.total;
            const pct = k => t[k].pct.toFixed(1) + '%';
            const icon = p => parseFloat(p) >= 80 ? '✅' : parseFloat(p) >= 60 ? '⚠️' : '❌';

            const stmt = pct('statements');
            const branch = pct('branches');
            const fn = pct('functions');
            const line = pct('lines');

            const body = [
              '## 📊 Coverage report',
              '',
              '| Metric | Coverage |',
              '|--------|----------|',
              `| Statements | ${icon(stmt)} ${stmt} |`,
              `| Branches   | ${icon(branch)} ${branch} |`,
              `| Functions  | ${icon(fn)} ${fn} |`,
              `| Lines      | ${icon(line)} ${line} |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // Update existing comment if one exists, otherwise create new
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.startsWith('## 📊 Coverage report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  smoke:
    name: Build smoke test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
