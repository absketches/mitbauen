name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Type check, tests & coverage
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # needed to post coverage comment on PRs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (app)
        run: npx tsc --noEmit

      - name: Type check (tests)
        run: npx tsc --noEmit --project tsconfig.test.json

      - name: Run tests with coverage
        run: npm run test:coverage -- --reporter=verbose

      - name: Post coverage summary to job
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const t = data.total;
            const pct = k => t[k].pct.toFixed(1);
            const overall = ((t.statements.pct + t.branches.pct + t.functions.pct + t.lines.pct) / 4).toFixed(1);
            const lines = [
              '## Overall coverage: ' + overall + '%',
              '',
              '| Metric | Coverage |',
              '|--------|----------|',
              '| Statements | ' + pct('statements') + '% |',
              '| Branches   | ' + pct('branches') + '% |',
              '| Functions  | ' + pct('functions') + '% |',
              '| Lines      | ' + pct('lines') + '% |',
            ];
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');
          "

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const t = summary.total;
            const pct = k => t[k].pct.toFixed(1) + '%';
            const stmt = pct('statements');
            const branch = pct('branches');
            const fn = pct('functions');
            const line = pct('lines');
            const overall = ((t.statements.pct + t.branches.pct + t.functions.pct + t.lines.pct) / 4).toFixed(1) + '%';
            const body = [
              `## Coverage report — ${overall} overall`,
              '',
              '| Metric | Coverage |',
              '|--------|----------|',
              `| Statements | ${stmt} |`,
              `| Branches   | ${branch} |`,
              `| Functions  | ${fn} |`,
              `| Lines      | ${line} |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // Update existing comment if one exists, otherwise create new
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.startsWith('## 📊 Coverage report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  smoke:
    name: Build smoke test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
